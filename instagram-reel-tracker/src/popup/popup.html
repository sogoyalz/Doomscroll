<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>InstaReel Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header"><h1>InstaReel Tracker</h1></header>

  <section id="summary" class="summary">
    <div class="stat"><span class="label">Total reels viewed:</span> <strong id="total">—</strong></div>
    <div class="stat"><span class="label">Last 1 min:</span> <strong id="last1m">—</strong></div>
    <div class="stat"><span class="label">Last 1 hour:</span> <strong id="last1h">—</strong></div>
    <div class="stat"><span class="label">Last 24h:</span> <strong id="last24">—</strong></div>
    <div class="stat"><span class="label">Avg watch time:</span> <strong id="avg">—</strong></div>
  </section>

  <section class="controls" id="controls">
    <button id="refresh">Refresh</button>
    <button id="export">Export CSV</button>
    <button id="clear" class="danger">Clear</button>
    <a id="openOptions" href="../options/options.html" target="_blank">Settings</a>
  </section>

  <section class="card">
    <div class="row">
      <h2 class="h2">Mood distribution</h2>
      <small class="muted" id="topMood"></small>
    </div>

    <div class="chart-grid">
      <div class="chart-area">
        <canvas id="moodChart" width="260" height="260" aria-label="Mood chart" role="img"></canvas>
      </div>
      <ul id="moodLegend" class="legend" aria-label="Mood legend"></ul>
    </div>
  </section>

  <footer class="footnote">
    <small class="muted">Records are stored locally in this browser.</small>
  </footer>

  <script src="popup.bundle.js"></script>
</body>
</html>
