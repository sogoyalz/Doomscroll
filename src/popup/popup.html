<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Doomscroll</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="brand-icon"></span>
        <h1>Doomscroll</h1>
      </div>
      <div class="range-tabs" id="rangeTabs" role="tablist" aria-label="Time range">
        <button class="range-tab" data-range="today" role="tab" aria-selected="true">Today</button>
        <button class="range-tab" data-range="week" role="tab" aria-selected="false">Week</button>
        <button class="range-tab" data-range="all" role="tab" aria-selected="false">All</button>
      </div>
    </header>

    <section class="headline">
      <p class="headline-label" id="headlineLabel">Today you've doomscrolled</p>
      <p class="headline-value" id="headlineValue">0m</p>
      <div class="headline-stats">
        <div class="stat">
          <strong id="totalReels">0</strong>
          <span>reels</span>
        </div>
        <div class="stat">
          <strong id="longestBinge">0m</strong>
          <span>longest binge</span>
        </div>
        <div class="stat">
          <strong id="avgPerReel">0s</strong>
          <span>avg / reel</span>
        </div>
        <div class="stat">
          <strong id="reelsScrolled">0</strong>
          <span>scrolled (all time)</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">By type</h2>
      <ul class="bars" id="typeBars"></ul>
    </section>

    <section class="card">
      <h2 class="section-title">Mood</h2>
      <div class="pills" id="moodPills"></div>
    </section>

    <section class="card">
      <div class="row">
        <h2 class="section-title">Recent</h2>
        <button class="link-btn" id="seeAll">See all</button>
      </div>
      <ul class="recent-list" id="recentList"></ul>
    </section>

    <footer class="footer">
      <button id="export">Export</button>
      <a id="openOptions" href="../options/options.html" target="_blank">Settings</a>
    </footer>

    <script src="../../dist/popup.bundle.js"></script>
  </body>
</html>
